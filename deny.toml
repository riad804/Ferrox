# cargo-deny configuration — run with: cargo deny check
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Analyse the full workspace, including dev/build dependencies.
targets = [
    { triple = "x86_64-unknown-linux-gnu"  },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin"       },
    { triple = "aarch64-apple-darwin"      },
    { triple = "x86_64-pc-windows-msvc"    },
]

# ── Advisories ────────────────────────────────────────────────────────────────
[advisories]
# Deny crates with active security vulnerabilities.
version = 2
yanked = "deny"

# ── Licences ─────────────────────────────────────────────────────────────────
[licenses]
version = 2
# Allow permissive licences only.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",   # allowed — weak copyleft, compatible with our use
]
# Unlicensed crates are denied.
unlicensed = "deny"
# Crates with multiple licences: allow if ANY listed licence is acceptable.
copyleft = "warn"

# ── Bans ─────────────────────────────────────────────────────────────────────
[bans]
# Warn on duplicate versions of the same crate (can inflate binary size).
multiple-versions = "warn"
# Deny known-problematic crates.
deny = [
    # C-based MP3 decoder — replaced by symphonia in this project.
    { name = "minimp3-sys" },
    # Old unmaintained OpenSSL binding.
    { name = "openssl-sys", wrappers = ["reqwest", "hyper-tls"] },
]
# Wildcards in Cargo.toml are disallowed for reproducibility.
wildcards = "deny"

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
# Only allow crates from crates.io and this repository.
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
