name: CI

on:
  push:
    branches: ["main"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── build + test ─────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # rav1e NASM assembler
          sudo apt-get install -y nasm
          # dav1d VP9/AV1 decoder (for `vp9` feature)
          sudo apt-get install -y libdav1d-dev
          # OpenH264 H.264 decoder (for `h264` feature) — not in default Ubuntu repos,
          # so we skip it on CI for now; the h264 feature requires a manual install.

      - name: Install system libraries (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm dav1d openh264

      - name: Build (default features)
        run: cargo build --workspace

      - name: Install audio encoder libs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libmp3lame-dev libopus-dev

      - name: Install audio encoder libs (macOS)
        if: runner.os == 'macOS'
        run: brew install lame opus

      - name: Build (all optional features, Linux/macOS only — C libs available)
        if: runner.os != 'Windows'
        run: cargo build -p ferrox-core --features "gpu,simd,vp9,mp3-encode,opus-encode"

      - name: Build (all optional features, Windows — skip C system libs)
        if: runner.os == 'Windows'
        run: cargo build -p ferrox-core --features "gpu,simd"

      - name: Test (with audio encoders + dynamic plugins, Linux/macOS)
        if: runner.os != 'Windows'
        run: cargo test --workspace --features "mp3-encode,opus-encode,dynamic-plugins"

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test (Windows — default features only)
        if: runner.os == 'Windows'
        run: cargo test --workspace

  # ── security audit ───────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet
      - name: Run cargo audit
        run: cargo audit

  # ── supply-chain (cargo deny) ─────────────────────────────────────────────
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

  # ── WASM build ───────────────────────────────────────────────────────────────
  wasm:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + WASM targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32-wasip1

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build core for wasm32-wasip1 (image + audio + video, no encode)
        run: |
          cargo build -p ferrox-core \
            --target wasm32-wasip1 \
            --no-default-features \
            --features "image-codecs,audio-codecs,video-codecs,filters-extra,gif-support"

      - name: Build WASM JS bindings (wasm32-unknown-unknown, wasm feature)
        run: |
          cargo build -p ferrox-core \
            --target wasm32-unknown-unknown \
            --no-default-features \
            --features "wasm"
